# 导航 Navigate V1 插件 · 默认 OFF
name: Navigate Verify

on:
  push:
    branches: [main, 'feat/navigate*']
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/navigate/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/navigate/**'
      - 'app/src/main/kotlin/com/lanxin/android/builtin/platform/PlatformPlugin.kt'
      - 'app/src/main/kotlin/com/lanxin/android/builtin/capabilities/**'
      - 'app/src/main/kotlin/com/lanxin/android/plugin/PluginManager.kt'
      - 'app/src/main/kotlin/com/lanxin/android/plugin/dynamic/PluginStateStore.kt'
      - 'app/src/main/kotlin/com/lanxin/android/presentation/ui/chat/ChatViewModel.kt'
      - 'app/src/main/kotlin/com/lanxin/android/presentation/ui/chat/ChatSendToolFilterLogic.kt'
      - 'app/src/main/kotlin/com/lanxin/android/presentation/LanXinApp.kt'
      - 'app/src/test/kotlin/com/lanxin/android/presentation/ui/chat/ChatSendFailureLogicTest.kt'
      - 'docs/navigate.md'
      - 'docs/guide.md'
      - '.github/workflows/navigate-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/navigate/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/navigate/**'
      - 'app/src/main/kotlin/com/lanxin/android/builtin/platform/PlatformPlugin.kt'
      - 'app/src/main/kotlin/com/lanxin/android/builtin/capabilities/**'
      - 'app/src/main/kotlin/com/lanxin/android/plugin/PluginManager.kt'
      - 'app/src/main/kotlin/com/lanxin/android/plugin/dynamic/PluginStateStore.kt'
      - 'app/src/main/kotlin/com/lanxin/android/presentation/ui/chat/ChatViewModel.kt'
      - 'app/src/main/kotlin/com/lanxin/android/presentation/ui/chat/ChatSendToolFilterLogic.kt'
      - 'app/src/main/kotlin/com/lanxin/android/presentation/LanXinApp.kt'
      - 'app/src/test/kotlin/com/lanxin/android/presentation/ui/chat/ChatSendFailureLogicTest.kt'
      - 'docs/navigate.md'
      - 'docs/guide.md'
      - '.github/workflows/navigate-verify.yml'
  workflow_dispatch:

concurrency:
  group: navigate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-compile:
    name: unit-and-compile
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup local.properties and debug keystore
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          rm -f debug-keystore.jks
          keytool -genkeypair -v -keystore debug-keystore.jks -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create assets model dir (models gitignored)
        run: |
          mkdir -p app/src/main/assets/models/gte-small
          touch app/src/main/assets/models/gte-small/.gitkeep

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests (navigate + smart capabilities defaults)
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.lanxin.android.builtin.navigate.*" \
            --tests "com.lanxin.android.builtin.capabilities.SmartCapabilitiesTest" \
            --tests "com.lanxin.android.plugin.dynamic.PluginStateStoreTest" \
            --tests "com.lanxin.android.presentation.ui.chat.ChatSendFailureLogicTest" \
            --no-daemon --stacktrace

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Surfaces and docs present
        run: |
          test -f docs/navigate.md
          test -f docs/guide.md
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/NavigatePlugin.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/di/NavigateModule.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/NavigateConfig.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/NavigateGate.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/PoiCategory.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/GeoMath.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/NavigationUriBuilder.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/OverpassPoiParser.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/HotelPriceHints.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/LocalAssistIntentRouter.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/tools/NearbyPoiTool.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/tools/OpenNavigationTool.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/navigate/tools/HotelPriceTool.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/navigate/NavigateDomainTest.kt
          # 禁止 ScenicGuide monlith / localguide 实现包
          ! find app/src -type f \( -name '*ScenicGuide*' -o -name '*LocalGuide*' -o -name '*localguide*' \) | grep .
          # 三工具在 NavigatePlugin，不在 PlatformPlugin
          grep -E -n "NEARBY_POI_TOOL|OPEN_NAVIGATION_TOOL|HOTEL_PRICE_TOOL|NearbyPoiTool|OpenNavigationTool|HotelPriceTool" \
            app/src/main/kotlin/com/lanxin/android/builtin/navigate/NavigatePlugin.kt
          ! grep -E -n "nearby_poi|open_navigation|hotel_price_lookup|NearbyPoiTool|OpenNavigationTool|HotelPriceTool" \
            app/src/main/kotlin/com/lanxin/android/builtin/platform/PlatformPlugin.kt
          # 默认 OFF + 插件注册
          grep -E -n "DEFAULT_ENABLED\\s*=\\s*false|PLUGIN_ID|lanxin\\.navigate" \
            app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/NavigateConfig.kt
          grep -E -n "defaultEnabled\\s*=\\s*NavigateConfig\\.DEFAULT_ENABLED|register\\(" \
            app/src/main/kotlin/com/lanxin/android/builtin/navigate/di/NavigateModule.kt
          grep -E -n "pluginEnabled|filterTools" \
            app/src/main/kotlin/com/lanxin/android/builtin/navigate/domain/NavigateGate.kt
          grep -E -n "NavigateGate\\.filterTools|navigateEnabled|GuideGate\\.filterTools|guideEnabled" \
            app/src/main/kotlin/com/lanxin/android/presentation/ui/chat/ChatSendToolFilterLogic.kt
          grep -E -n "NavigatePluginRegistration|GuidePluginRegistration" \
            app/src/main/kotlin/com/lanxin/android/presentation/LanXinApp.kt
          grep -E -n "NAVIGATE|navigateEnabled|smart_capabilities_navigate" \
            app/src/main/kotlin/com/lanxin/android/builtin/capabilities/domain/SmartCapabilitiesConfig.kt \
            app/src/main/kotlin/com/lanxin/android/builtin/capabilities/presentation/SmartCapabilitiesScreen.kt
          grep -E -n "defaultEnabled|ensureDefault" \
            app/src/main/kotlin/com/lanxin/android/plugin/PluginManager.kt \
            app/src/main/kotlin/com/lanxin/android/plugin/dynamic/PluginStateStore.kt
          # 文档
          grep -E -n "默认|OFF|lanxin\\.navigate|NavigatePlugin|开启" docs/navigate.md
          grep -E -n "导游|Guide|默认" docs/guide.md

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lanxin-debug-apk-navigate
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
