# Phase 5 同步引擎验证：协议 + LWW 单测（5.1 / 5.2）
name: Phase5 Sync Verify

on:
  push:
    branches: [main, 'feat/phase5*']
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/sync/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/sync/**'
      - 'docs/sync-protocol.md'
      - 'builtin/sync/**'
      - '.github/workflows/phase5-sync-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/sync/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/sync/**'
      - 'docs/sync-protocol.md'
      - 'builtin/sync/**'
      - '.github/workflows/phase5-sync-verify.yml'
  workflow_dispatch:

concurrency:
  group: phase5-sync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Sync unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup local.properties and debug keystore
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          rm -f debug-keystore.jks
          keytool -genkeypair -v -keystore debug-keystore.jks -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create assets model dir (models gitignored)
        run: |
          mkdir -p app/src/main/assets/models/gte-small
          touch app/src/main/assets/models/gte-small/.gitkeep

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run sync unit tests (incl. LWW)
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.lanxin.android.builtin.sync.*" \
            --no-daemon --stacktrace

      - name: Protocol and LWW surface present
        run: |
          test -f docs/sync-protocol.md
          test -f builtin/sync/README.md
          test -f app/src/main/kotlin/com/lanxin/android/builtin/sync/domain/LwwResolver.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/sync/LwwResolverTest.kt
          # use grep (runner may not have rg); avoid */ in shell comments
          grep -E -n "POST /api/sync/pull|LWW|SyncItem|preferRemote|防复活" docs/sync-protocol.md
          grep -E -n "fun compare|fun decide|fun shouldApply|fun mergeById|LwwDecision" \
            app/src/main/kotlin/com/lanxin/android/builtin/sync/domain/LwwResolver.kt
          grep -E -n "tombstone|preferRemote|mergeById knowledge|isConflictResolution" \
            app/src/test/kotlin/com/lanxin/android/builtin/sync/LwwResolverTest.kt
          grep -E -n "skipped|conflictResolved" \
            app/src/main/kotlin/com/lanxin/android/builtin/sync/domain/SyncModels.kt
          grep -E -n "applyRemoteItem|LwwResolver.decide" \
            app/src/main/kotlin/com/lanxin/android/builtin/sync/data/DefaultSyncRepository.kt
