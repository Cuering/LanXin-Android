# CI TTS/ASR 模型验证
name: CI Verify Voice Models

on:
  push:
    branches: [main]
    paths:
      - 'scripts/ci-verify-tts.py'
      - '.github/workflows/ci-voice-models.yml'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/ci-verify-tts.py'
      - '.github/workflows/ci-voice-models.yml'

jobs:
  verify-voice-models:
    name: Verify ASR + TTS (Python native)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sherpa-onnx
        run: pip install sherpa-onnx

      - name: Download models and verify synthesis
        run: |
          python3 scripts/ci-verify-tts.py --download --output-dir /tmp/ci-voice-models
