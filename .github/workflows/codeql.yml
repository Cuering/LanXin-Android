name: "CodeQL Advanced"

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  analyze:
    name: Analyze (kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: kotlin
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'oracle'
        java-version: '17'
        cache: 'gradle'

    - name: Setup local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties

    - name: Install Android SDK components
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        sdkmanager --list_installed || true

    - name: Diagnostic info
      run: |
        {
          echo "### CI Environment Diagnostic"
          echo ""
          echo "**Java version:**"
          java -version 2>&1
          echo ""
          echo "**ANDROID_HOME:** $ANDROID_HOME"
          echo ""
          echo "**Installed SDK platforms:**"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          echo ""
          echo "**Installed build-tools:**"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"
          echo ""
          echo "**Gradle version:**"
          ./gradlew --version 2>/dev/null || echo "gradlew not available"
        } >> $GITHUB_STEP_SUMMARY

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace 2>&1 | tail -100

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
