name: Phase7 System Tools Verify

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**/builtin/systemtools/**'
      - 'app/**/builtin/pet/**'
      - 'docs/system-tools.md'
      - 'builtin/systemtools/**'
      - 'ARCHITECTURE.md'
  push:
    branches:
      - feat/phase7-system-tools-skeleton
      - feat/phase7.2-calendar-alarm
      - feat/phase7.3-notes
      - feat/phase7.4-file-manager
      - feat/phase7.5-voice-chat-tools

concurrency:
  group: phase7-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: System Tools Unit Tests
        run: |
          ./gradlew :app:testDebugUnitTest --tests "com.lanxin.android.builtin.systemtools.*" --tests "com.lanxin.android.builtin.pet.VoiceSessionToolBridgeTest" --no-daemon

      - name: Surface check - docs present
        run: |
          test -f docs/system-tools.md || { echo 'Missing docs/system-tools.md'; exit 1; }
          grep -q 'DeviceTool' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceTool.kt 2>/dev/null || { echo 'Missing DeviceTool interface'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/AndroidCalendarReader.kt || { echo 'Missing AndroidCalendarReader'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/AndroidAlarmSetter.kt || { echo 'Missing AndroidAlarmSetter'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/AndroidSystemToolsIntentLauncher.kt || { echo 'Missing IntentLauncher'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/CalendarIntentBuilder.kt || { echo 'Missing CalendarIntentBuilder'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/receiver/SystemToolsAlarmReceiver.kt || { echo 'Missing SystemToolsAlarmReceiver'; exit 1; }
          grep -q 'READ_CALENDAR' app/src/main/AndroidManifest.xml || { echo 'Missing READ_CALENDAR permission'; exit 1; }
          grep -q 'SystemToolsIntentLauncher' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/StubDeviceTools.kt || { echo 'alarm/calendar tools must use IntentLauncher'; exit 1; }
          grep -q '7.2' docs/system-tools.md || { echo 'docs must mention 7.2'; exit 1; }
          # Phase 7.3 notes surfaces
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/NotesStore.kt || { echo 'Missing NotesStore'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/notes/RoomNotesStore.kt || { echo 'Missing RoomNotesStore'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/notes/NotesDatabase.kt || { echo 'Missing NotesDatabase'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/notes/AndroidNotesSafGateway.kt || { echo 'Missing AndroidNotesSafGateway'; exit 1; }
          test -f app/src/test/kotlin/com/lanxin/android/builtin/systemtools/NotesStoreTest.kt || { echo 'Missing NotesStoreTest'; exit 1; }
          grep -q 'NOTE_EXPORT' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceTool.kt || { echo 'Missing NOTE_EXPORT id'; exit 1; }
          grep -q 'NOTE_IMPORT' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceTool.kt || { echo 'Missing NOTE_IMPORT id'; exit 1; }
          grep -q 'NotesStore' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/StubDeviceTools.kt || { echo 'note tools must use NotesStore'; exit 1; }
          grep -q '7.3' docs/system-tools.md || { echo 'docs must mention 7.3'; exit 1; }
          grep -q 'Room' docs/system-tools.md || { echo 'docs must mention Room for notes'; exit 1; }
          # Phase 7.4 user files surfaces
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/UserFileStore.kt || { echo 'Missing UserFileStore'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/files/AndroidUserFileIoGateway.kt || { echo 'Missing AndroidUserFileIoGateway'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/files/InMemoryUserFileCatalog.kt || { echo 'Missing InMemoryUserFileCatalog'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/files/UserFileDeviceTools.kt || { echo 'Missing UserFileDeviceTools'; exit 1; }
          test -f app/src/test/kotlin/com/lanxin/android/builtin/systemtools/UserFileStoreTest.kt || { echo 'Missing UserFileStoreTest'; exit 1; }
          grep -q 'FILE_PICK' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceTool.kt || { echo 'Missing FILE_PICK id'; exit 1; }
          grep -q 'FILE_DELETE' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceTool.kt || { echo 'Missing FILE_DELETE id'; exit 1; }
          grep -q 'UserFileCatalog' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/di/SystemToolsModule.kt || { echo 'DI must bind UserFileCatalog'; exit 1; }
          grep -q '7.4' docs/system-tools.md || { echo 'docs must mention 7.4'; exit 1; }
          grep -q 'file_pick' docs/system-tools.md || { echo 'docs must mention file_pick'; exit 1; }
          grep -q 'DocumentsContract' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/files/AndroidUserFileIoGateway.kt || { echo 'must use DocumentsContract for delete'; exit 1; }
          grep -q 'takePersistableUriPermission' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/data/files/AndroidUserFileIoGateway.kt || { echo 'must takePersistable'; exit 1; }
          # Phase 7.5 voice/chat bridge surfaces
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceToolBridge.kt || { echo 'Missing DeviceToolBridge'; exit 1; }
          test -f app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceToolIntentResolver.kt || { echo 'Missing DeviceToolIntentResolver'; exit 1; }
          test -f app/src/test/kotlin/com/lanxin/android/builtin/systemtools/DeviceToolBridgeTest.kt || { echo 'Missing DeviceToolBridgeTest'; exit 1; }
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/VoiceSessionToolBridgeTest.kt || { echo 'Missing VoiceSessionToolBridgeTest'; exit 1; }
          grep -q 'DeviceToolBridge' app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/VoiceSessionCoordinator.kt || { echo 'VoiceSession must use DeviceToolBridge'; exit 1; }
          grep -q 'voiceTurn' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceToolBridge.kt || { echo 'Missing voiceTurn'; exit 1; }
          grep -q 'chatTurn' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceToolBridge.kt || { echo 'Missing chatTurn'; exit 1; }
          grep -q 'voiceTurn' app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/VoiceSessionCoordinator.kt || { echo 'VoiceSession must call voiceTurn'; exit 1; }
          grep -q 'decideWithDeviceToolHint' app/src/main/kotlin/com/lanxin/android/builtin/localinference/domain/ChatRouter.kt || { echo 'ChatRouter must expose decideWithDeviceToolHint'; exit 1; }
          grep -q '7.5' docs/system-tools.md || { echo 'docs must mention 7.5'; exit 1; }
          grep -q 'DeviceToolBridge' docs/system-tools.md || { echo 'docs must mention DeviceToolBridge'; exit 1; }

      - name: Surface check - no model curl
        run: |
          # Search source/script directories for model download commands, excluding this workflow file
          found=$(grep -rn "curl.*sherpa-onnx\|curl.*modelscope\|wget.*sherpa" \
            app/ scripts/ builtin/ docs/ 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "ERROR: Found model download commands in source files:"
            echo "$found"
            exit 1
          fi
          echo "OK: No model download commands found in source code"
