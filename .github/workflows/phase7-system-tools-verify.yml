name: Phase7 System Tools Verify

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**/builtin/systemtools/**'
      - 'docs/system-tools.md'
      - 'builtin/systemtools/**'
      - 'ARCHITECTURE.md'
  push:
    branches: [ feat/phase7-system-tools-skeleton ]

concurrency:
  group: phase7-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: System Tools Unit Tests
        run: |
          ./gradlew :app:testDebugUnitTest --tests "com.lanxin.android.builtin.systemtools.*" --no-daemon

      - name: Surface check - docs present
        run: |
          test -f docs/system-tools.md || { echo 'Missing docs/system-tools.md'; exit 1; }
          grep -q 'DeviceTool' app/src/main/kotlin/com/lanxin/android/builtin/systemtools/domain/DeviceTool.kt 2>/dev/null || { echo 'Missing DeviceTool interface'; exit 1; }

      - name: Surface check - no model curl
        run: |
          if grep -rn "curl.*sherpa-onnx\|curl.*modelscope\|wget.*sherpa" .github/workflows/phase7-system-tools-verify.yml 2>/dev/null; then
            echo "ERROR: Found model download commands in workflow file"
            exit 1
          fi
