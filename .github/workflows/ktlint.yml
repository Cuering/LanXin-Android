name: Kotlin Lint Check

on:
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - ".gitignore"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".editorconfig"
      - "images/**"
      - "metadata/**"
  push:
    branches:
      - "main"

jobs:
  ktlint:
    name: Check Kotlin Code Format
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "oracle"
          java-version: "17"
          cache: "gradle"

      - name: Setup local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Run ktlint format (auto-fix)
        run: ./gradlew ktlintFormat --stacktrace --info 2>&1 | tail -80

      - name: Run ktlint check
        run: ./gradlew ktlintCheck --stacktrace --info 2>&1 | tail -80
