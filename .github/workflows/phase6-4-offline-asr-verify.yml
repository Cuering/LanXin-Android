# Phase 6.4 / P0 离线 ASR：stub + Sherpa 真引擎骨架 / 单测 / 文档
name: Phase6.4 Offline ASR Verify

on:
  push:
    branches: [main, 'feat/phase6*', 'feat/p0-sherpa*']
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/androidTest/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/build.gradle.kts'
      - 'app/libs/**'
      - 'docs/voice-asr.md'
      - 'builtin/voice/**'
      - 'third_party/sherpa-onnx/**'
      - 'ARCHITECTURE.md'
      - '.github/workflows/phase6-4-offline-asr-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/androidTest/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/build.gradle.kts'
      - 'app/libs/**'
      - 'docs/voice-asr.md'
      - 'builtin/voice/**'
      - 'third_party/sherpa-onnx/**'
      - 'ARCHITECTURE.md'
      - '.github/workflows/phase6-4-offline-asr-verify.yml'
  workflow_dispatch:

concurrency:
  group: phase6-4-asr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Offline ASR unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup local.properties and debug keystore
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          rm -f debug-keystore.jks
          keytool -genkeypair -v -keystore debug-keystore.jks -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create assets model dir (models gitignored)
        run: |
          mkdir -p app/src/main/assets/models/gte-small
          touch app/src/main/assets/models/gte-small/.gitkeep

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download sherpa-onnx AAR
        run: |
          ./gradlew :app:downloadSherpaOnnxAar --no-daemon --stacktrace
          test -f app/libs/sherpa-onnx-static-link-onnxruntime-1.13.4.aar
          ls -lh app/libs/*.aar

      - name: Run offline ASR unit tests
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.lanxin.android.builtin.voice.*" \
            --no-daemon --stacktrace

      - name: Surfaces and docs present
        run: |
          test -f docs/voice-asr.md
          test -f builtin/voice/README.md
          test -f third_party/sherpa-onnx/NOTICE
          test -f app/src/main/kotlin/com/lanxin/android/builtin/voice/domain/AsrEngine.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/voice/data/StubAsrEngine.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/voice/data/SherpaAsrEngine.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/voice/data/SherpaOnnxBridge.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/voice/di/VoiceModule.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/voice/StubAsrEngineTest.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/voice/SherpaAsrEngineTest.kt
          grep -E -n "interface AsrEngine|fun load|fun unload|fun transcribe|streamPartial|isReady|isAvailable" \
            app/src/main/kotlin/com/lanxin/android/builtin/voice/domain/AsrEngine.kt
          grep -E -n "SherpaAsrEngine|bindAsrEngine" \
            app/src/main/kotlin/com/lanxin/android/builtin/voice/di/VoiceModule.kt
          grep -E -n "System.loadLibrary|loadModel|isNativeAvailable|tryLoadNative" \
            app/src/main/kotlin/com/lanxin/android/builtin/voice/data/SherpaOnnxBridge.kt
          grep -E -n "downloadSherpaOnnxAar|sherpa-onnx" app/build.gradle.kts
          grep -E -n "RECORD_AUDIO" app/src/main/AndroidManifest.xml
          grep -E -n "Apache|sherpa-onnx" third_party/sherpa-onnx/NOTICE
          grep -E -n "SherpaAsrEngine|static-link|downloadSherpaOnnxAar|native_degraded" docs/voice-asr.md
