name: Debug build APK

on:
  pull_request_target:
    branches:
      - "main"
    paths-ignore:
      - ".gitignore"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".github/**"
      - ".editorconfig"
      - "images/**"
      - "metadata/**"
  push:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Setup local.properties and debug keystore
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          rm -f debug-keystore.jks
          keytool -genkeypair -v -keystore debug-keystore.jks -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Setup release keystore for signed Debug APK
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.LANXIN_RELEASE_KEYSTORE }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_B64" ]; then
            echo "$RELEASE_KEYSTORE_B64" | base64 -d > release-keystore.jks
          else
            # Fallback: generate a proper release keystore in CI
            keytool -genkeypair -v -keystore release-keystore.jks -alias lanxin \
              -keyalg RSA -keysize 2048 -validity 10000 -storepass lanxin123 -keypass lanxin123 \
              -dname "CN=兰心,O=兰心,C=CN"
          fi

      - name: Build signed debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleSignedDebug --no-daemon --build-cache -Pci

      - name: Upload signed debug APK
        uses: actions/upload-artifact@v7
        id: artifact-upload-step
        with:
          name: debug-${{ github.sha }}
          path: ${{ github.workspace }}/app/build/outputs/apk/signedDebug/app-signed-debug.apk

      - name: Comment APK Link
        if: github.event_name == 'pull_request_target'
        uses: thollander/actions-comment-pull-request@v3
        with:
          comment_tag: apk
          message: |
            Build complete! Here's the debug APK: ${{ steps.artifact-upload-step.outputs.artifact-url }}
