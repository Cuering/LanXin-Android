name: Debug build APK

on:
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - ".gitignore"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".github/**"
      - ".editorconfig"
      - "images/**"
      - "metadata/**"
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  run:
    name: Build debug APK
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "oracle"
          java-version: "17"
          cache: "gradle"

      - name: Setup local.properties and debug keystore
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          keytool -genkeypair -v -keystore debug-keystore.jks -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        id: artifact-upload-step
        with:
          name: debug-${{ github.sha }}
          path: ${{ github.workspace }}/app/build/outputs/apk/debug/app-debug.apk

      - name: Comment APK Link
        if: github.event_name == "pull_request"
        uses: thollander/actions-comment-pull-request@v3
        with:
          comment_tag: apk
          message: |
            Build complete! Here's the debug APK: ${{ steps.artifact-upload-step.outputs.artifact-url }}
