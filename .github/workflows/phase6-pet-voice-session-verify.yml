# Phase 6 桌宠：M1 + M2a + M2b 壳 + 表情/口型打磨（无模型下载）
name: Phase6 Pet Voice Session Verify

on:
  push:
    branches: [main, 'feat/phase6*', 'feat/m2b*', 'feat/vendor-live2d*', 'feat/app-inapp*']
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/pet/**'
      - 'app/src/main/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/pet/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/main/assets/pet/**'
      - 'docs/meiju-style-pet.md'
      - 'docs/debug-assets.md'
      - 'docs/live2d-mao-sample.md'
      - 'scripts/fetch-debug-assets.sh'
      - 'scripts/download-debug-assets.sh'
      - 'scripts/vendor-live2d-mao.sh'
      - 'builtin/pet/**'
      - 'ARCHITECTURE.md'
      - '.github/workflows/phase6-pet-voice-session-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/src/main/kotlin/com/lanxin/android/builtin/pet/**'
      - 'app/src/main/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/pet/**'
      - 'app/src/test/kotlin/com/lanxin/android/builtin/voice/**'
      - 'app/src/main/assets/pet/**'
      - 'docs/meiju-style-pet.md'
      - 'docs/debug-assets.md'
      - 'docs/live2d-mao-sample.md'
      - 'scripts/fetch-debug-assets.sh'
      - 'scripts/download-debug-assets.sh'
      - 'scripts/vendor-live2d-mao.sh'
      - 'builtin/pet/**'
      - 'ARCHITECTURE.md'
      - '.github/workflows/phase6-pet-voice-session-verify.yml'
  workflow_dispatch:

concurrency:
  group: phase6-pet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Pet voice session unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup local.properties and debug keystore
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          rm -f debug-keystore.jks
          keytool -genkeypair -v -keystore debug-keystore.jks -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create assets model dir (models gitignored)
        run: |
          mkdir -p app/src/main/assets/models/gte-small
          touch app/src/main/assets/models/gte-small/.gitkeep

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run pet + tts unit tests
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.lanxin.android.builtin.pet.*" \
            --tests "com.lanxin.android.builtin.voice.StubTtsEngineTest" \
            --no-daemon --stacktrace

      - name: Surfaces and docs present
        run: |
          test -f docs/meiju-style-pet.md
          test -f docs/debug-assets.md
          test -f docs/live2d-mao-sample.md
          test -f scripts/fetch-debug-assets.sh
          test -f scripts/download-debug-assets.sh
          test -f scripts/vendor-live2d-mao.sh
          test -f builtin/pet/README.md
          test -f debug-assets/README.md
          test -f app/src/main/assets/pet/desktop-pet.html
          # 仓内官方 Live2D Sample Mao（开箱）
          test -f app/src/main/assets/pet/live2d/Mao/Mao.model3.json
          test -f app/src/main/assets/pet/live2d/Mao/Mao.moc3
          test -f app/src/main/assets/pet/live2d/Mao/NOTICE.txt
          test -f app/src/main/assets/pet/live2d/Mao/Mao.2048/texture_00.png
          test -d app/src/main/assets/pet/live2d/Mao/motions
          test -d app/src/main/assets/pet/live2d/Mao/expressions
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/VoiceSessionStateMachine.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/VoiceSessionCoordinator.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/PetBridgeProtocol.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/PetPathReadiness.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/DebugOpenSourcePaths.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/DebugAssetDownloader.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/DebugAssetCatalog.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/AssetDownloadTransport.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/data/KtorAssetDownloadTransport.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/DebugAssetDownloaderTest.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/Live2dDisplayController.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/BuiltInLive2dAssets.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/data/FloatingPetService.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/data/DesktopPetBridge.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/data/AndroidVoiceBridge.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/voice/domain/TtsEngine.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/voice/data/StubTtsEngine.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/VoiceSessionStateMachineTest.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/PetBridgeProtocolTest.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/VoiceSessionCoordinatorTest.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/PetPathReadinessTest.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/Live2dDisplayControllerTest.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/BuiltInLive2dAssetsTest.kt
          test -f app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/PetExpressionController.kt
          test -f app/src/test/kotlin/com/lanxin/android/builtin/pet/PetExpressionControllerTest.kt
          grep -E -n "SYSTEM_ALERT_WINDOW|FloatingPetService" app/src/main/AndroidManifest.xml
          grep -E -n "DESKTOP_PET|DesktopPetScreen" \
            app/src/main/kotlin/com/lanxin/android/presentation/common/Route.kt \
            app/src/main/kotlin/com/lanxin/android/presentation/common/NavigationGraph.kt
          grep -E -n "桌宠|VoiceSession|妹居|M2a|M2b|Live2D" ARCHITECTURE.md docs/meiju-style-pet.md
          grep -E -n "fetch-debug-assets|已就绪|local_inference_model_path|内置示例|builtin-live2d|一键下载|ghproxy|MIRROR" \
            docs/debug-assets.md docs/meiju-style-pet.md docs/live2d-mao-sample.md
          grep -E -n "IDLE|LISTENING|THINKING|SPEAKING|LOAD_LIVE2D|LIVE2D_STATUS|SET_EXPRESSION" \
            app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/VoiceSessionModels.kt
          grep -E -n "LOAD_LIVE2D|LIVE2D_SHELL|onLive2dModelPath|live2d-shell|SET_EXPRESSION|mouth" \
            app/src/main/assets/pet/desktop-pet.html
          grep -E -n "PetExpressionController|SET_EXPRESSION|mouthOpen" \
            app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/PetBridgeProtocol.kt \
            app/src/main/kotlin/com/lanxin/android/builtin/pet/data/FloatingPetService.kt
          grep -E -n "Live2dDisplayController|LOAD_LIVE2D|BuiltInLive2dAssets|ensureInstalled" \
            app/src/main/kotlin/com/lanxin/android/builtin/pet/data/FloatingPetService.kt
          grep -E -n "LOGICAL_PATH|ASSET_ROOT|builtin-live2d|Sample Data Terms" \
            app/src/main/kotlin/com/lanxin/android/builtin/pet/domain/BuiltInLive2dAssets.kt
          # 红线：仓库内不应出现妹居商业资源 / 大权重
          ! grep -R -n "棕发1.moc3\|meju_flow.mnn\|sister_android.json" \
            app/src/main docs builtin 2>/dev/null || true
          # 不在 workflow 内 curl 模型（排除本检查注释行）
          ! grep -E "curl.*sherpa-onnx.*tar" .github/workflows/phase6-pet-voice-session-verify.yml | grep -v "grep -E"
          ! grep -E "curl.*CubismWebSamples|curl.*live2d.*Mao" .github/workflows/phase6-pet-voice-session-verify.yml | grep -v "grep -E" || true
