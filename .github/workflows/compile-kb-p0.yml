# 知识库 P0 编译验证
# 触发：push 到 feat/knowledge-base，手动也可
# 目的：触发 ObjectBox 注解处理器生成 MyObjectBox

name: Compile KB P0

on:
  push:
    branches: [feat/knowledge-base]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create assets model dir
        run: |
          mkdir -p app/src/main/assets/models/gte-small
          touch app/src/main/assets/models/gte-small/.gitkeep

      - name: Compile Debug (including ObjectBox annotation processing)
        id: compile
        continue-on-error: true
        run: |
          ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Show Gradle errors if failed
        if: steps.compile.outputs.exit_code != '0'
        run: |
          echo "=== Last 100 lines of Gradle output ==="
          tail -100 /tmp/gradle.log
          echo "=== Search for ERROR/FAIL ==="
          grep -n -i "error:" /tmp/gradle.log | tail -20 || true
          grep -n "FAIL" /tmp/gradle.log | tail -20 || true
          grep -n "Exception" /tmp/gradle.log | tail -20 || true
          grep -n "What went wrong" /tmp/gradle.log | tail -10 || true
          exit 1

      - name: Run unit tests
        id: test
        continue-on-error: true
        run: |
          mkdir -p /tmp/test-artifacts
          ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace 2>&1 | tee /tmp/test.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          cp -r app/build/test-results/testDebugUnitTest/ /tmp/test-artifacts/ 2>/dev/null || true

      - name: Show test output
        if: always()
        run: |
          echo "### Test Step Exit Code: ${{ steps.test.outputs.exit_code }} ###"
          echo ""
          echo "=== FAILED TESTS ==="
          grep -E "(FAILED|failed|✗)" /tmp/test.log | head -50 || echo "(no FAILED lines found)"
          echo ""
          echo "=== TEST SUMMARY ==="
          grep -E "(BUILD|tests? (completed|run)|PASSED|FAILURE|SUCCESS)" /tmp/test.log | tail -20
          echo ""
          echo "=== STACK TRACES ==="
          grep -A 10 "Exception\|AssertionError\|ComparisonFailure\|RuntimeException" /tmp/test.log | head -150 || echo "(no exceptions found)"
          echo ""
          echo "=== LAST 100 LINES ==="
          tail -100 /tmp/test.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: /tmp/test-artifacts/
          retention-days: 3

      - name: Check test result
        run: |
          exit_code="${{ steps.test.outputs.exit_code }}"
          if [ "$exit_code" != "0" ] && [ -n "$exit_code" ]; then
            echo "❌ Tests failed with exit code $exit_code"
            exit 1
          fi
          echo "✅ Tests passed"

      - name: Upload generated MyObjectBox
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: app/build/generated/source/
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/
          retention-days: 7