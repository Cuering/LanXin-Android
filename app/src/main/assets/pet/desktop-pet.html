<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>兰心桌宠</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    }
    /* 全屏舞台：无白框卡片，模型铺满可用区域 */
    #root {
      width: 100%; height: 100%;
      display: block;
      position: relative;
      overflow: hidden;
      background: transparent;
    }
    #bubble {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translate(-50%, 8px);
      max-width: min(88vw, 360px);
      min-width: 80px;
      background: rgba(255, 72, 96, 0.92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,.85);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      text-align: center;
      word-break: break-word;
      box-shadow: 0 6px 18px rgba(0,0,0,.28);
      opacity: 0;
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: none;
      z-index: 5;
    }
    #bubble.show { opacity: 1; transform: translate(-50%, 0); }
    #stage {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    /* 占位/失败态同样全屏，无小窗白框 */
    #avatar {
      width: min(72vw, 280px);
      height: min(78vw, 340px);
      max-height: 72vh;
      border-radius: 28px 28px 36px 36px;
      background: linear-gradient(160deg, #ffb7c5 0%, #ff7aa2 55%, #e85d8e 100%);
      box-shadow: 0 14px 36px rgba(232, 93, 142, .35);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      border: none;
      z-index: 2;
      transform: translateY(6%);
    }
    #avatar.hidden { display: none; }
    #face {
      font-size: clamp(48px, 12vw, 72px);
      line-height: 1;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.15));
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,.95);
      background: rgba(0,0,0,.28);
      padding: 3px 10px;
      border-radius: 999px;
    }
    #mouth {
      width: 32px; height: 8px;
      margin-top: 6px;
      border-radius: 0 0 14px 14px;
      background: rgba(80, 20, 40, .55);
      transform-origin: center top;
      transition: height .08s linear, border-radius .08s linear;
    }
    #mouth.anim {
      animation: mouthTalk .28s ease-in-out infinite alternate;
    }
    @keyframes mouthTalk {
      from { height: 6px; border-radius: 0 0 10px 10px; }
      to   { height: 16px; border-radius: 0 0 18px 18px; background: rgba(60,10,30,.7); }
    }
    /* Live2D 壳：全屏透明，去掉圆角白边小窗 */
    #live2d-shell {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border-radius: 0;
      overflow: hidden;
      background: transparent;
      border: none;
      box-shadow: none;
      z-index: 2;
    }
    #live2d-shell.active { display: block; }
    #live2d-canvas {
      width: 100%; height: 100%;
      display: block;
      background: transparent;
    }
    #pixi-host {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 1;
      background: transparent;
    }
    #pixi-host.active { display: block; }
    /* 角标轻量浮层，不占主体 */
    #live2d-badge {
      position: absolute;
      left: 10px; bottom: 10px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,.38);
      padding: 2px 7px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 4;
      opacity: 0.72;
    }
    #mode-tag {
      position: absolute;
      right: 10px; top: 10px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,.38);
      padding: 3px 8px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 3;
      opacity: 0.78;
    }
    #controls {
      display: none;
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      gap: 8px;
      z-index: 6;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(0,0,0,.72);
      color: #fff;
      cursor: pointer;
    }
    button:active { transform: scale(.96); }
    button.danger { background: rgba(180, 30, 50, .85); }
    /* 小窗悬浮场景才露出控件 */
    @media (max-width: 200px), (max-height: 280px) {
      #controls { display: flex; }
      #avatar {
        width: 110px; height: 130px;
        transform: none;
      }
      #bubble { top: 4%; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="bubble"></div>
    <div id="stage">
      <div id="mode-tag">占位</div>
      <div id="avatar" title="LanXin Pet Placeholder">
        <div id="face">😊</div>
        <div id="mouth" aria-hidden="true"></div>
        <div id="status">闲置</div>
      </div>
      <div id="live2d-shell" title="LanXin Live2D">
        <div id="pixi-host"></div>
        <canvas id="live2d-canvas" width="280" height="320"></canvas>
        <div id="live2d-badge">Live2D</div>
      </div>
    </div>
    <div id="controls">
      <button id="btn-voice" type="button">语音</button>
      <button id="btn-close" class="danger" type="button">关闭</button>
    </div>
  </div>
  <!-- P3: Cubism Core + Pixi + pixi-live2d-display cubism4（仓内 assets，离线可用） -->
  <script src="lib/live2dcubismcore.min.js"></script>
  <script src="lib/pixi.min.js"></script>
  <script src="lib/cubism4.min.js"></script>
  <script>
    (function () {
      var bubble = document.getElementById('bubble');
      var face = document.getElementById('face');
      var statusEl = document.getElementById('status');
      var avatar = document.getElementById('avatar');
      var shell = document.getElementById('live2d-shell');
      var canvas = document.getElementById('live2d-canvas');
      var pixiHost = document.getElementById('pixi-host');
      var modeTag = document.getElementById('mode-tag');
      var badge = document.getElementById('live2d-badge');
      var hideTimer = null;
      var displayMode = 'PLACEHOLDER';
      var lastPhase = 'IDLE';
      var animHandle = null;
      var breathT = 0;
      var mouthEl = document.getElementById('mouth');
      var lastExpression = 'IDLE_SMILE';
      var mouthOpen = 0;
      var mouthAnimating = false;
      var musicBeat = 0;
      var musicBeatEnabled = true;
      // 双级平滑 + 显示值限斜率，避免 Visualizer 尖峰导致剧抖
      var musicBeatSmoothed = 0;
      var musicBeatDisplay = 0;
      // 慢舞相位（与 breathT 解耦，更低频率）
      var dancePhase = 0;

      // Cubism / Pixi runtime
      var pixiApp = null;
      var live2dModel = null;
      var cubismReady = false;
      var loadToken = 0;
      var engineAvailable = false;

      var PHASE_UI = {
        IDLE:      { face: '😊', label: '闲置', tint: '#ffb7c5' },
        LISTENING: { face: '👂', label: '在听…', tint: '#9ad0ff' },
        THINKING:  { face: '💭', label: '想想…', tint: '#d2b4ff' },
        SPEAKING:  { face: '💬', label: '在说…', tint: '#ffd27a' },
        ERROR:     { face: '😅', label: '出错了', tint: '#ff9a9a' }
      };

      function detectEngine() {
        try {
          engineAvailable = !!(
            window.Live2DCubismCore &&
            window.PIXI &&
            PIXI.live2d &&
            typeof PIXI.live2d.Live2DModel === 'function'
          );
        } catch (e) {
          engineAvailable = false;
        }
        return engineAvailable;
      }

      function setPhase(phase) {
        lastPhase = phase || 'IDLE';
        var ui = PHASE_UI[lastPhase] || PHASE_UI.IDLE;
        face.textContent = ui.face;
        statusEl.textContent = ui.label;
        if (displayMode === 'LIVE2D_REAL' || displayMode === 'LIVE2D_SHELL') {
          modeTag.textContent = (displayMode === 'LIVE2D_REAL' ? 'Cubism·' : 'L2D·') + ui.label;
        }
        applyExpressionFromPhase(lastPhase);
      }

      function applyExpressionFromPhase(phase) {
        var map = {
          IDLE: { expression: 'IDLE_SMILE', mouthOpen: 0, mouthAnimating: false, emoji: '😊', label: '闲置' },
          LISTENING: { expression: 'LISTENING', mouthOpen: 0, mouthAnimating: false, emoji: '👂', label: '在听' },
          THINKING: { expression: 'THINKING', mouthOpen: 0, mouthAnimating: false, emoji: '💭', label: '想想' },
          SPEAKING: { expression: 'SPEAKING', mouthOpen: 0.55, mouthAnimating: true, emoji: '💬', label: '在说' },
          ERROR: { expression: 'APOLOGY', mouthOpen: 0, mouthAnimating: false, emoji: '😅', label: '出错' }
        };
        applyExpression(map[phase] || map.IDLE);
      }

      function applyExpression(meta) {
        if (!meta) return;
        lastExpression = meta.expression || lastExpression;
        mouthOpen = parseFloat(meta.mouthOpen);
        if (isNaN(mouthOpen)) mouthOpen = 0;
        mouthAnimating = String(meta.mouthAnimating) === 'true' || meta.mouthAnimating === true;
        if (meta.emoji) face.textContent = meta.emoji;
        if (meta.label) statusEl.textContent = meta.label;
        if (mouthEl) {
          if (mouthAnimating) {
            mouthEl.classList.add('anim');
            mouthEl.style.height = '';
          } else {
            mouthEl.classList.remove('anim');
            var h = 6 + Math.max(0, Math.min(1, mouthOpen)) * 12;
            mouthEl.style.height = h + 'px';
          }
        }
        applyCubismExpression(lastExpression, mouthOpen, mouthAnimating);
      }

      function showBubble(text) {
        if (!text) return;
        bubble.textContent = text;
        bubble.classList.add('show');
        if (hideTimer) clearTimeout(hideTimer);
        hideTimer = setTimeout(function () {
          bubble.classList.remove('show');
        }, 4500);
      }

      function hideBubble() {
        bubble.classList.remove('show');
      }

      function reportStatus(mode, reason) {
        displayMode = mode || 'PLACEHOLDER';
        safeCall(function () {
          if (window.DesktopPetBridge && DesktopPetBridge.postMessage) {
            var lines = [
              'command=LIVE2D_STATUS',
              'timestampMs=' + Date.now(),
              'live2dMode=' + displayMode,
              'live2dReason=' + (reason || '')
            ];
            DesktopPetBridge.postMessage(lines.join('\n'));
          }
        });
      }

      function showPlaceholder(reason, forcedMode) {
        stopShellAnim();
        destroyCubismModel();
        hidePixiHost();
        shell.classList.remove('active');
        avatar.classList.remove('hidden');
        var r = String(reason || '');
        var isFallback = forcedMode === 'FALLBACK' ||
          r.indexOf('fallback') >= 0 ||
          r.indexOf('missing') >= 0 ||
          r.indexOf('invalid') >= 0 ||
          r.indexOf('fail') >= 0;
        modeTag.textContent = isFallback ? '降级' : '占位';
        if (badge) badge.textContent = '占位';
        reportStatus(isFallback ? 'FALLBACK' : 'PLACEHOLDER', r);
      }

      function stopShellAnim() {
        if (animHandle) {
          cancelAnimationFrame(animHandle);
          animHandle = null;
        }
      }

      function hidePixiHost() {
        if (pixiHost) pixiHost.classList.remove('active');
        if (canvas) canvas.style.display = 'block';
      }

      function showPixiHost() {
        if (pixiHost) pixiHost.classList.add('active');
        if (canvas) canvas.style.display = 'none';
      }

      function destroyCubismModel() {
        try {
          if (live2dModel) {
            if (pixiApp && pixiApp.stage) {
              try { pixiApp.stage.removeChild(live2dModel); } catch (e1) {}
            }
            try {
              if (typeof live2dModel.destroy === 'function') live2dModel.destroy({ children: true });
            } catch (e2) {}
          }
        } catch (e) {}
        live2dModel = null;
      }

      function destroyPixiApp() {
        destroyCubismModel();
        try {
          if (pixiApp) {
            try { pixiApp.ticker.stop(); } catch (e0) {}
            try {
              if (pixiApp.view && pixiApp.view.parentNode) {
                pixiApp.view.parentNode.removeChild(pixiApp.view);
              }
            } catch (e1) {}
            try { pixiApp.destroy(true, { children: true, texture: false, baseTexture: false }); } catch (e2) {}
          }
        } catch (e) {}
        pixiApp = null;
        cubismReady = false;
      }

      function stageSize() {
        var w = (pixiHost && pixiHost.clientWidth) ||
          (shell && shell.clientWidth) ||
          (document.documentElement && document.documentElement.clientWidth) ||
          window.innerWidth || 360;
        var h = (pixiHost && pixiHost.clientHeight) ||
          (shell && shell.clientHeight) ||
          (document.documentElement && document.documentElement.clientHeight) ||
          window.innerHeight || 640;
        return { w: Math.max(64, w), h: Math.max(64, h) };
      }

      function ensurePixiApp() {
        if (pixiApp) return pixiApp;
        if (!detectEngine()) return null;
        var sz = stageSize();
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        try {
          pixiApp = new PIXI.Application({
            width: sz.w,
            height: sz.h,
            backgroundAlpha: 0,
            antialias: true,
            autoDensity: true,
            resolution: dpr,
            powerPreference: 'high-performance'
          });
          pixiHost.innerHTML = '';
          pixiHost.appendChild(pixiApp.view);
          pixiApp.view.style.width = '100%';
          pixiApp.view.style.height = '100%';
          pixiApp.view.style.display = 'block';
          // ticker: mouth + soft dance（慢慢跳舞，禁止剧抖）
          pixiApp.ticker.add(function () {
            breathT += 1;
            dancePhase += 1;
            advanceMusicBeatSmooth();
            tickCubismFrame();
          });
          cubismReady = true;
          return pixiApp;
        } catch (e) {
          console.warn('[LanXin Pet] PIXI.Application fail', e);
          pixiApp = null;
          cubismReady = false;
          return null;
        }
      }

      // 布局锁：键盘/IME 绝不 re-layout；layout 只写 base，之后 tick 独占 scale
      var __lastFullLayoutW = 0;
      var __lastFullLayoutH = 0;
      var __layoutDone = false;
      var __nativeModelW = 0;
      var __nativeModelH = 0;

      function resizePixi() {
        if (!pixiApp) return;
        var sz = stageSize();
        try {
          var prevW = __lastFullLayoutW;
          var prevH = __lastFullLayoutH;
          // 键盘弹起：高度下降 → 完全 skip layout / 不碰 base / 不改 scale
          if (prevH > 0 && sz.h < prevH * 0.92) {
            // 宽度几乎不变：连 renderer.resize 也跳过，避免 WebView IME 抖动
            if (prevW > 0 && Math.abs(sz.w - prevW) < 2) {
              return;
            }
            // 仅撑住画布高度，绝不 layoutLive2dModel
            pixiApp.renderer.resize(sz.w, Math.max(sz.h, prevH));
            return;
          }
          // 尺寸变化过小：不 resize、不 layout（防反馈环）
          if (prevW > 0 && prevH > 0 &&
              Math.abs(sz.w - prevW) < 4 && Math.abs(sz.h - prevH) < 4) {
            return;
          }
          // 只向上记录「真全屏」尺寸，防止键盘收缩污染 base
          if (sz.w > prevW) __lastFullLayoutW = sz.w;
          if (sz.h > prevH) __lastFullLayoutH = sz.h;
          if (__lastFullLayoutW <= 0) __lastFullLayoutW = sz.w;
          if (__lastFullLayoutH <= 0) __lastFullLayoutH = sz.h;
          pixiApp.renderer.resize(
            __lastFullLayoutW > 0 ? __lastFullLayoutW : sz.w,
            __lastFullLayoutH > 0 ? __lastFullLayoutH : sz.h
          );
          // 动画期间默认不 re-layout；仅首次或真正显著变大（旋转/分屏）才 force
          if (!__layoutDone) {
            layoutLive2dModel(true);
          } else if (
            (prevW > 0 && Math.abs(sz.w - prevW) > 48) ||
            (prevH > 0 && sz.h > prevH * 1.12)
          ) {
            layoutLive2dModel(true);
          }
        } catch (e) {}
      }

      /**
       * 模型布局：只算/写 __baseScale + 初始 x/y。
       * - 永远用未缩放原生尺寸（缓存 __nativeModelW/H），禁止用动画 scale 回写
       * - layout 完成后 tick 独占 scale/x/y/rot；动画期间勿与 tick 交替写 scale
       * - force=true：加载后一次 / 真·显著尺寸变化；否则 no-op
       */
      function layoutLive2dModel(force) {
        if (!live2dModel || !pixiApp) return;
        if (__layoutDone && !force) return;
        try {
          var w = pixiApp.renderer.width / (pixiApp.renderer.resolution || 1);
          var h = pixiApp.renderer.height / (pixiApp.renderer.resolution || 1);
          var mw = __nativeModelW;
          var mh = __nativeModelH;
          // 仅首次（无缓存）才 scale=1 测 bounds；已有原生尺寸绝不再 transient scale=1（防闪）
          if (!(mw > 1 && mh > 1)) {
            if (live2dModel.scale) live2dModel.scale.set(1, 1);
            if (live2dModel.rotation != null) live2dModel.rotation = 0;
            var bounds = live2dModel.getBounds ? live2dModel.getBounds(true) : null;
            mw = (bounds && bounds.width) || live2dModel.width || 1;
            mh = (bounds && bounds.height) || live2dModel.height || 1;
            if (!isFinite(mw) || mw <= 0) mw = 1;
            if (!isFinite(mh) || mh <= 0) mh = 1;
            if (mw > 1 && mh > 1) {
              __nativeModelW = mw;
              __nativeModelH = mh;
            }
          }
          var scale = Math.min((w * 1.18) / mw, (h * 1.08) / mh);
          if (!isFinite(scale) || scale <= 0) scale = 0.22;
          scale = scale * 1.05;
          // layout 只写 base，并立刻落到 scale；之后动画帧由 tick 独占
          live2dModel.__baseScale = scale;
          live2dModel.__baseX = w / 2;
          live2dModel.__baseY = h * 0.62;
          if (live2dModel.scale) live2dModel.scale.set(scale, scale);
          live2dModel.anchor && live2dModel.anchor.set && live2dModel.anchor.set(0.5, 0.5);
          live2dModel.x = live2dModel.__baseX;
          live2dModel.y = live2dModel.__baseY;
          if (live2dModel.rotation != null) live2dModel.rotation = 0;
          __layoutDone = true;
          __lastFullLayoutW = w;
          __lastFullLayoutH = h;
        } catch (e) {
          console.warn('[LanXin Pet] layout fail', e);
        }
      }

      /**
       * 节拍强平滑：EMA(0.96) + 每帧限斜率(0.012) + 绝对限幅。
       * 关闭跟随节奏时归零，不残留附加晃动。
       */
      function advanceMusicBeatSmooth() {
        if (!musicBeatEnabled) {
          musicBeat = 0;
          musicBeatSmoothed *= 0.88;
          if (musicBeatSmoothed < 0.002) musicBeatSmoothed = 0;
          musicBeatDisplay *= 0.88;
          if (musicBeatDisplay < 0.002) musicBeatDisplay = 0;
          return musicBeatDisplay;
        }
        var target = Math.max(0, Math.min(1, musicBeat));
        // 强 EMA：更慢跟上尖峰
        musicBeatSmoothed = musicBeatSmoothed * 0.96 + target * 0.04;
        // 限斜率：约 60fps 下从 0→1 至少 ~2.8s，视觉上更钝
        var delta = musicBeatSmoothed - musicBeatDisplay;
        var maxStep = 0.006;
        if (delta > maxStep) delta = maxStep;
        if (delta < -maxStep) delta = -maxStep;
        musicBeatDisplay += delta;
        if (musicBeatDisplay < 0) musicBeatDisplay = 0;
        if (musicBeatDisplay > 1) musicBeatDisplay = 1;
        return musicBeatDisplay;
      }

      /**
       * 慢舞偏移：低频正弦 × 弱节拍包络。
       * 只动 x/y/rotation；scalePulse ≡ 0（音乐跟随禁止任何缩放）。
       * 限幅：X≤1.5px Y≤1.0px rot≤0.01
       */
      function softDanceOffset(beat) {
        var b = Math.max(0, Math.min(1, beat || 0));
        // 极慢相位：~0.12Hz 主摆 + 更弱副摆
        var p = dancePhase * 0.012;
        var p2 = dancePhase * 0.007;
        var swayX = (Math.sin(p) * 0.9 + Math.sin(p2) * 0.35) * (0.2 + b * 0.55);
        var swayY = (Math.cos(p * 0.85) * 0.55 - Math.sin(p2 * 1.1) * 0.2) * (0.15 + b * 0.55)
          - b * 0.35;
        var rot = Math.sin(p * 0.7) * 0.004 + Math.sin(p2) * b * 0.004;
        // scalePulse 必须恒 0：音乐轻舞禁止缩放，杜绝「放大↔正常」闪烁
        var scalePulse = 0;
        if (swayX > 1.5) swayX = 1.5;
        if (swayX < -1.5) swayX = -1.5;
        if (swayY > 1.0) swayY = 1.0;
        if (swayY < -1.0) swayY = -1.0;
        if (rot > 0.01) rot = 0.01;
        if (rot < -0.01) rot = -0.01;
        return { x: swayX, y: swayY, rot: rot, scalePulse: scalePulse };
      }

      function tickCubismFrame() {
        if (!live2dModel) return;
        try {
          // scale 恒定 = __baseScale；音乐跟随彻底禁止改 scale（scalePulse≡0，无 scale 呼吸）
          // 只写 x/y/rotation；layout 只更新 base，不与 tick 交替抢 scale
          var beat = musicBeatEnabled ? musicBeatDisplay : 0;
          var base = live2dModel.__baseScale;
          if (base == null || !isFinite(base) || base <= 0) {
            base = 1;
            live2dModel.__baseScale = base;
          }
          var bx = live2dModel.__baseX != null ? live2dModel.__baseX : live2dModel.x;
          var by = live2dModel.__baseY != null ? live2dModel.__baseY : live2dModel.y;
          // 位移-only 轻呼吸（不改 scale）
          var ox = 0, oy = Math.sin(breathT * 0.022) * 0.25, orot = Math.sin(breathT * 0.016) * 0.002;
          if (musicBeatEnabled && beat > 0.001) {
            var d = softDanceOffset(beat);
            ox = d.x;
            oy = d.y + Math.sin(breathT * 0.022) * 0.15;
            orot = d.rot;
            // d.scalePulse 恒 0，禁止参与 scale
          }
          // 恒定 base：不乘 breath / scalePulse，杜绝放大↔正常闪烁
          if (live2dModel.scale) live2dModel.scale.set(base, base);
          live2dModel.x = bx + ox;
          live2dModel.y = by + oy;
          live2dModel.rotation = orot;

          // lip sync ParamMouthOpenY
          var mOpen = mouthAnimating
            ? (0.25 + 0.45 * (0.5 + 0.5 * Math.sin(breathT * 0.35)))
            : Math.max(0, Math.min(1, mouthOpen));
          setMouthOpen(mOpen);
        } catch (e) {}
      }

      function setMouthOpen(value) {
        if (!live2dModel) return;
        try {
          var core = live2dModel.internalModel && live2dModel.internalModel.coreModel;
          if (core && typeof core.setParameterValueById === 'function') {
            core.setParameterValueById('ParamMouthOpenY', value);
            return;
          }
          if (live2dModel.internalModel && live2dModel.internalModel.motionManager) {
            // ignore
          }
        } catch (e) {}
      }

      function applyCubismExpression(expression, open, anim) {
        if (!live2dModel) return;
        try {
          // 尝试按 phase 映射官方 exp
          var map = {
            IDLE_SMILE: 'exp_01',
            LISTENING: 'exp_02',
            THINKING: 'exp_03',
            SPEAKING: 'exp_04',
            APOLOGY: 'exp_05',
            FALLBACK_NEUTRAL: 'exp_01'
          };
          var name = map[expression] || 'exp_01';
          if (typeof live2dModel.expression === 'function') {
            try { live2dModel.expression(name); } catch (e1) {
              try { live2dModel.expression(0); } catch (e2) {}
            }
          }
          if (!anim) setMouthOpen(open || 0);
        } catch (e) {}
      }

      function drawShellFrame(ctx, w, h, phase, t, textures) {
        ctx.clearRect(0, 0, w, h);
        var ui = PHASE_UI[phase] || PHASE_UI.IDLE;
        // 位移-only 轻舞；scale 恒 1（scalePulse≡0），杜绝缩放闪
        var beat = musicBeatEnabled ? musicBeatDisplay : 0;
        var scale = 1;
        var swayX = 0;
        var swayY = Math.sin(t * 0.022) * 0.25;
        var rot = Math.sin(t * 0.016) * 0.002;
        if (musicBeatEnabled && beat > 0.001) {
          var d = softDanceOffset(beat);
          swayX = d.x;
          swayY = d.y + Math.sin(t * 0.022) * 0.15;
          rot = d.rot;
          // scalePulse ≡ 0，禁止缩放
          scale = 1;
        }
        ctx.save();
        ctx.translate(w / 2 + swayX, h / 2 + 8 + swayY);
        ctx.rotate(rot);
        ctx.scale(scale, scale);

        var g = ctx.createRadialGradient(0, 10, 10, 0, 0, Math.min(w, h) * 0.48);
        g.addColorStop(0, ui.tint);
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(0, 18, w * 0.32, h * 0.38, 0, 0, Math.PI * 2);
        ctx.fill();

        if (textures && textures.length) {
          for (var i = 0; i < Math.min(textures.length, 3); i++) {
            var img = textures[i];
            if (!img || !img.complete || !img.naturalWidth) continue;
            // 全屏壳：纹理尽量铺满，略偏下
            var maxW = w * 0.98;
            var maxH = h * 0.98;
            var r = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight) * 1.08;
            var dw = img.naturalWidth * r;
            var dh = img.naturalHeight * r;
            ctx.globalAlpha = i === 0 ? 1 : 0.95;
            ctx.drawImage(img, -dw / 2, -dh / 2 + h * 0.04, dw, dh);
          }
        } else {
          var bodyR = Math.min(w, h) * 0.22;
          ctx.fillStyle = ui.tint;
          ctx.beginPath();
          ctx.ellipse(0, 10, bodyR * 0.72, bodyR, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = Math.round(bodyR * 0.9) + 'px system-ui,sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(ui.face, 0, 0);
        }

        var mOpen = mouthAnimating ? (0.25 + 0.45 * (0.5 + 0.5 * Math.sin(t * 0.35))) : mouthOpen;
        var mouthScale = Math.min(w, h) / 320;
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = 'rgba(60, 15, 30, 0.75)';
        ctx.beginPath();
        ctx.ellipse(0, 28 * mouthScale, 12 * mouthScale, (4 + mOpen * 10) * mouthScale, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 0.55;
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = Math.max(2, 2 * mouthScale);
        ctx.beginPath();
        ctx.arc(0, 10, Math.min(w, h) * 0.18 + Math.sin(t * 0.08) * 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function startShellAnim(textures) {
        stopShellAnim();
        hidePixiHost();
        var ctx = canvas.getContext('2d');
        if (!ctx) return;
        function resizeCanvas() {
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          var sz = stageSize();
          var cssW = canvas.clientWidth || sz.w;
          var cssH = canvas.clientHeight || sz.h;
          canvas.width = Math.floor(cssW * dpr);
          canvas.height = Math.floor(cssH * dpr);
        }
        resizeCanvas();
        function tick() {
          breathT += 1;
          dancePhase += 1;
          advanceMusicBeatSmooth();
          // 偶发旋转/键盘弹起后容器尺寸变化
          if (breathT % 30 === 0) {
            var sz = stageSize();
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            var wantW = Math.floor((canvas.clientWidth || sz.w) * dpr);
            var wantH = Math.floor((canvas.clientHeight || sz.h) * dpr);
            if (canvas.width !== wantW || canvas.height !== wantH) {
              canvas.width = wantW;
              canvas.height = wantH;
            }
          }
          drawShellFrame(ctx, canvas.width, canvas.height, lastPhase, breathT, textures);
          animHandle = requestAnimationFrame(tick);
        }
        tick();
      }

      function resolveUrl(baseDirUrl, rel) {
        if (!rel) return '';
        if (/^https?:\/\//i.test(rel) || /^file:\/\//i.test(rel)) return rel;
        var base = (baseDirUrl || '').replace(/\/?$/, '/');
        return base + String(rel).replace(/^\.\//, '');
      }

      function loadTexturesFromModel3(model3Json, dirUrl, done) {
        var refs = (model3Json && model3Json.FileReferences) || {};
        var textures = refs.Textures || refs.textures || [];
        if (!textures.length) {
          done([]);
          return;
        }
        var loaded = [];
        var pending = textures.length;
        textures.forEach(function (rel, idx) {
          var url = resolveUrl(dirUrl, rel);
          var img = new Image();
          img.onload = function () {
            loaded[idx] = img;
            pending -= 1;
            if (pending <= 0) done(loaded.filter(Boolean));
          };
          img.onerror = function () {
            pending -= 1;
            if (pending <= 0) done(loaded.filter(Boolean));
          };
          img.src = url;
        });
      }

      function decodeModel3B64(b64) {
        if (!b64) return null;
        try {
          var bin = atob(String(b64).replace(/\s+/g, ''));
          if (typeof TextDecoder !== 'undefined') {
            var bytes = new Uint8Array(bin.length);
            for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
          }
          try {
            return decodeURIComponent(escape(bin));
          } catch (e2) {
            return bin;
          }
        } catch (e) {
          console.warn('[LanXin Pet] model3 b64 decode fail', e);
          return null;
        }
      }

      function parseModel3Json(text) {
        if (!text) return null;
        try {
          return JSON.parse(text);
        } catch (e) {
          console.warn('[LanXin Pet] model3 JSON parse fail', e);
          return null;
        }
      }

      function finishShellWithJson(json, dirUrl, reasonSuffix) {
        loadTexturesFromModel3(json, dirUrl, function (textures) {
          startShellAnim(textures);
          var reason = textures.length
            ? ('textures_ok' + (reasonSuffix ? '_' + reasonSuffix : ''))
            : ('textures_empty_geom' + (reasonSuffix ? '_' + reasonSuffix : ''));
          reportStatus('LIVE2D_SHELL', reason);
          modeTag.textContent = reasonSuffix ? 'L2D·壳' : 'Live2D 壳';
          if (badge) badge.textContent = '壳';
          if (!textures.length) {
            modeTag.textContent = 'L2D·几何';
          }
        });
      }

      function activateShellFallback(meta, reason) {
        destroyCubismModel();
        hidePixiHost();
        var fileUrl = meta.live2dFileUrl || '';
        var dirUrl = meta.live2dDirUrl || '';
        var model3B64 = meta.live2dModel3B64 || '';
        var injectedJson = null;
        if (model3B64) {
          injectedJson = parseModel3Json(decodeModel3B64(model3B64));
        }
        shell.classList.add('active');
        avatar.classList.add('hidden');
        modeTag.textContent = 'Live2D 壳';
        displayMode = 'LIVE2D_SHELL';
        startShellAnim([]);
        if (injectedJson) {
          finishShellWithJson(injectedJson, dirUrl, reason || 'cubism_fallback');
          return;
        }
        if (!fileUrl) {
          showPlaceholder(reason || 'live2d_file_url_empty', 'FALLBACK');
          return;
        }
        fetch(fileUrl)
          .then(function (r) {
            if (!r.ok) throw new Error('http_' + r.status);
            return r.json();
          })
          .then(function (json) {
            finishShellWithJson(json, dirUrl, reason || 'cubism_fallback');
          })
          .catch(function (err) {
            showPlaceholder(reason || 'live2d_load_fail', 'FALLBACK');
            showBubble('Live2D 加载失败，已降级');
            console.warn('[LanXin Pet] Live2D shell fallback', err);
          });
      }

      function tryPlayIdleMotion() {
        if (!live2dModel) return;
        try {
          if (typeof live2dModel.motion === 'function') {
            // Mao Idle group
            live2dModel.motion('Idle').catch(function () {});
          }
        } catch (e) {}
      }

      function loadCubismModel(modelUrl, token) {
        return new Promise(function (resolve, reject) {
          if (!detectEngine()) {
            reject(new Error('engine_unavailable'));
            return;
          }
          var app = ensurePixiApp();
          if (!app) {
            reject(new Error('pixi_app_fail'));
            return;
          }
          showPixiHost();
          resizePixi();
          var Live2DModel = PIXI.live2d.Live2DModel;
          // 避免预载全部 motion 占内存
          var opts = {};
          try {
            if (PIXI.live2d.MotionPreloadStrategy) {
              opts.motionPreload = PIXI.live2d.MotionPreloadStrategy.IDLE;
            }
          } catch (e0) {}
          Live2DModel.from(modelUrl, opts)
            .then(function (model) {
              if (token !== loadToken) {
                try { model.destroy({ children: true }); } catch (e) {}
                reject(new Error('stale_load'));
                return;
              }
              destroyCubismModel();
              live2dModel = model;
              try {
                model.interactive = false;
                model.buttonMode = false;
              } catch (e1) {}
              app.stage.addChild(model);
              // 加载后只完整 layout 一次；之后禁止用动画 scale 回写 base
              __layoutDone = false;
              __nativeModelW = 0;
              __nativeModelH = 0;
              layoutLive2dModel(true);
              tryPlayIdleMotion();
              applyCubismExpression(lastExpression, mouthOpen, mouthAnimating);
              resolve(model);
            })
            .catch(function (err) {
              reject(err || new Error('from_fail'));
            });
        });
      }

      function activateCubismReal(meta) {
        var fileUrl = meta.live2dFileUrl || '';
        var dirUrl = meta.live2dDirUrl || '';
        if (!fileUrl) {
          showPlaceholder('live2d_file_url_empty', 'FALLBACK');
          return;
        }
        if (!detectEngine()) {
          activateShellFallback(meta, 'cubism_engine_missing');
          return;
        }

        shell.classList.add('active');
        avatar.classList.add('hidden');
        modeTag.textContent = 'Cubism…';
        if (badge) badge.textContent = 'Cubism';
        displayMode = 'LIVE2D_REAL';
        stopShellAnim();

        var token = ++loadToken;
        loadCubismModel(fileUrl, token)
          .then(function () {
            if (token !== loadToken) return;
            modeTag.textContent = 'Cubism·' + ((PHASE_UI[lastPhase] || PHASE_UI.IDLE).label);
            if (badge) badge.textContent = 'Cubism';
            reportStatus('LIVE2D_REAL', 'cubism_ok');
          })
          .catch(function (err) {
            if (token !== loadToken) return;
            console.warn('[LanXin Pet] Cubism real load fail → shell', err);
            activateShellFallback(meta, 'cubism_load_fail');
            // 不弹泡打扰；仅 console
          });
      }

      function activateLive2dShell(meta) {
        // P3：优先真 Cubism；失败 → 纹理壳 → 占位
        activateCubismReal(meta);
      }

      function applyLoadLive2d(map) {
        var mode = (map.live2dMode || map.mode || '').toUpperCase();
        if (mode === 'LIVE2D_SHELL' || mode === 'LIVE2D_REAL') {
          activateLive2dShell({
            live2dFileUrl: map.live2dFileUrl || '',
            live2dDirUrl: map.live2dDirUrl || '',
            live2dPath: map.live2dPath || '',
            live2dModel3B64: map.live2dModel3B64 || ''
          });
          return;
        }
        if (mode === 'FALLBACK') {
          showPlaceholder(map.live2dReason || 'fallback', 'FALLBACK');
          return;
        }
        showPlaceholder(map.live2dReason || 'placeholder', 'PLACEHOLDER');
      }

      function parseNativeMessage(raw) {
        if (!raw) return;
        var map = {};
        String(raw).split('\\n').join('\n').split('\n').forEach(function (line) {
          var i = line.indexOf('=');
          if (i > 0) map[line.slice(0, i)] = line.slice(i + 1);
        });
        var cmd = (map.command || '').toUpperCase();
        if (map.phase) setPhase(map.phase);
        if (cmd === 'SHOW_BUBBLE' || map.bubble || map.subtitle) {
          showBubble(map.bubble || map.subtitle || map.replyText || '');
        }
        if (cmd === 'HIDE_BUBBLE') hideBubble();
        if (cmd === 'SESSION_STATE' && map.subtitle) showBubble(map.subtitle);
        if (cmd === 'LOAD_LIVE2D') applyLoadLive2d(map);
        if (cmd === 'SET_MUSIC_BEAT' || map.beatLevel != null) {
          var rawLv = parseFloat(map.beatLevel);
          if (!isFinite(rawLv)) rawLv = 0;
          if (rawLv > 1.0001) rawLv = rawLv / 100;
          // 仅更新目标值；帧循环里 advanceMusicBeatSmooth 做强平滑+限斜率
          musicBeat = Math.max(0, Math.min(1, rawLv));
          if (map.beatEnabled != null) {
            musicBeatEnabled = String(map.beatEnabled).toLowerCase() !== 'false';
          }
          if (!musicBeatEnabled) {
            musicBeat = 0;
            musicBeatSmoothed = 0;
            musicBeatDisplay = 0;
          }
        }
        if (cmd === 'SET_PET_STATE' && map.phase) setPhase(map.phase);
        if (cmd === 'SET_EXPRESSION' || map.expression) {
          applyExpression({
            expression: map.expression,
            mouthOpen: map.mouthOpen,
            mouthAnimating: map.mouthAnimating,
            emoji: map.expressionEmoji,
            label: map.expressionLabel
          });
          if (map.phase) {
            lastPhase = map.phase;
            if (displayMode === 'LIVE2D_REAL') {
              modeTag.textContent = 'Cubism·' + (map.expressionLabel || map.phase);
            } else if (displayMode === 'LIVE2D_SHELL') {
              modeTag.textContent = 'L2D·' + (map.expressionLabel || map.phase);
            }
          }
        }
        if (cmd === 'SESSION_STATE' && map.expression) {
          applyExpression({
            expression: map.expression,
            mouthOpen: map.mouthOpen,
            mouthAnimating: map.mouthAnimating,
            emoji: map.expressionEmoji,
            label: map.expressionLabel
          });
        }
      }

      window.onNativePetMessage = function (raw) {
        try { parseNativeMessage(raw); } catch (e) {}
      };

      window.onLive2dModelPath = function (path) {
        try {
          if (!path) {
            showPlaceholder('path_empty');
            return;
          }
          modeTag.textContent = '路径已推';
        } catch (e) {}
      };

      function safeCall(fn) {
        try { fn(); } catch (e) {}
      }

      document.getElementById('btn-voice').addEventListener('click', function () {
        safeCall(function () {
          if (window.AndroidVoiceBridge && AndroidVoiceBridge.startVoiceChat) {
            AndroidVoiceBridge.startVoiceChat();
          } else if (window.DesktopPetBridge && DesktopPetBridge.requestStartVoice) {
            DesktopPetBridge.requestStartVoice();
          }
        });
        setPhase('LISTENING');
        showBubble('…');
      });

      document.getElementById('btn-close').addEventListener('click', function () {
        safeCall(function () {
          if (window.DesktopPetBridge && DesktopPetBridge.closePet) {
            DesktopPetBridge.closePet();
          }
        });
      });

      setInterval(function () {
        safeCall(function () {
          if (window.AndroidVoiceBridge && AndroidVoiceBridge.getPhase) {
            setPhase(AndroidVoiceBridge.getPhase());
            var sub = AndroidVoiceBridge.getSubtitle && AndroidVoiceBridge.getSubtitle();
            if (sub) showBubble(sub);
          }
        });
      }, 1200);

      window.addEventListener('resize', function () {
        if (pixiApp) resizePixi();
      });
      // 全屏容器尺寸变化（Compose/WebView 布局后）
      try {
        if (typeof ResizeObserver !== 'undefined' && shell) {
          var ro = new ResizeObserver(function () {
            if (pixiApp) resizePixi();
          });
          ro.observe(shell);
          if (pixiHost) ro.observe(pixiHost);
        }
      } catch (eRo) {}

      window.__lanxinPetTeardown = function () {
        loadToken += 1;
        stopShellAnim();
        destroyPixiApp();
        mouthAnimating = false;
        musicBeat = 0;
        musicBeatSmoothed = 0;
        musicBeatDisplay = 0;
        dancePhase = 0;
        __lastFullLayoutW = 0;
        __lastFullLayoutH = 0;
        __layoutDone = false;
        __nativeModelW = 0;
        __nativeModelH = 0;
        if (mouthEl) mouthEl.classList.remove('anim');
        if (hideTimer) clearTimeout(hideTimer);
        hideBubble();
      };

      // 探测引擎，供单测/调试
      window.__lanxinLive2dEngine = {
        detect: detectEngine,
        isReal: function () { return displayMode === 'LIVE2D_REAL' && !!live2dModel; },
        mode: function () { return displayMode; }
      };

      setPhase('IDLE');
      showPlaceholder('boot');
      detectEngine();

      if (!window.__LANXIN_LIVE2D_HINT__) {
        window.__LANXIN_LIVE2D_HINT__ = true;
        console.info(
          '[LanXin Pet] P3 Cubism real: engine=' + engineAvailable +
          ' LOAD_LIVE2D → LIVE2D_REAL|SHELL|FALLBACK; lib/ cubismcore+pixi+cubism4'
        );
      }
    })();
  </script>
</body>
</html>
